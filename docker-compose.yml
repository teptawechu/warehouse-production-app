services:
  mysql:
    image: mysql:8.4
    container_name: warehouse-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: warehouse_app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: warehouse-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: warehouse_app
      JWT_SECRET: change-me-in-prod
      JWT_EXPIRES_IN: 12h
      CORS_ORIGIN: http://localhost:5000
      ADMIN_USERNAME: admin01
      ADMIN_PASSWORD: admin123
      ADMIN_DISPLAY_NAME: Main Admin
    ports:
      - "5000:5000"
    command: sh -c "node scripts/seed-default-warehouse.js && node scripts/seed-default-teams.js && node scripts/seed-admin-user.js && node src/server.js"

volumes:
  mysql_data:
